# 个人简介
summary: '我是圣路易斯华盛顿大学电气与系统工程系的博士研究生，导师为Andrew Clark教授和Netanel Raviv教授。2024年获得华盛顿大学系统科学与数学硕士学位，2021年获得四川大学信息管理与信息系统学士学位。我的研究关注复杂系统的普遍规律，目前专注于多元高阶关系——具体包括部分信息分解（PID）和高阶网络控制两个方向。'

