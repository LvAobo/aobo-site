# a summary about you
summary: 'I am a PhD student in the Department of Electrical and Systems Engineering at Washington University in St. Louis, advised by Prof. Andrew Clark and Prof. Netanel Raviv. I received my M.S. in Systems Science and Mathematics from WashU in 2024, and my B.S. in Information Management and Information Systems from Sichuan University in 2021. My research focuses on universal principles of complex systems, with a current emphasis on higher-order interactions — specifically through Partial Information Decomposition (PID) and higher-order network control.'

