# Research interests displayed as skill cards
skills:
- name: Complex Systems
  logo: /images/sections/skills/cloud.png
  summary: "I am broadly interested in the universal principles governing complex systems, including phenomena such as emergence, self-organization, and consciousness across diverse systems."

- name: Partial Information Decomposition
  logo: /images/sections/skills/kubernetes.png
  summary: "My research develops the theoretical foundations of Partial Information Decomposition (PID), an information-theoretic framework that decomposes multivariate relationships into redundant, unique, and synergistic components — enabling the identification of higher-order interactions in complex systems."

- name: Higher-order Networks
  logo: /images/sections/skills/git.png
  summary: "I study how to represent and control higher-order interactions through mathematical structures such as hypergraphs and simplicial complexes, extending classical network science beyond pairwise relationships."
